<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>John's Keystone Bible Verses</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cinzel:wght@400;500&family=EB+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #00002d;
    --white: #ffffff;
    --gold: #c9a96e;
    --gold-dim: rgba(201, 169, 110, 0.15);
    --white-dim: rgba(255,255,255,0.07);
    --white-border: rgba(255,255,255,0.55);
    --glow: rgba(201,169,110,0.18);
  }

  html { scroll-behavior: smooth; }

  body {
    background-color: var(--bg);
    color: var(--white);
    font-family: 'EB Garamond', Georgia, serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Star field */
  .stars {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }
  .star {
    position: absolute;
    background: white;
    border-radius: 50%;
    animation: twinkle var(--d, 4s) ease-in-out infinite;
    opacity: var(--o, 0.4);
  }
  @keyframes twinkle {
    0%, 100% { opacity: var(--o, 0.4); transform: scale(1); }
    50% { opacity: calc(var(--o, 0.4) * 0.3); transform: scale(0.8); }
  }

  header {
    position: relative;
    z-index: 10;
    text-align: center;
    padding: 60px 20px 40px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }

  header h1 {
    font-family: 'Cinzel', serif;
    font-weight: 400;
    font-size: clamp(1.6rem, 4vw, 3rem);
    letter-spacing: 0.12em;
    color: var(--white);
    margin-bottom: 10px;
  }

  header p {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: clamp(1rem, 2vw, 1.25rem);
    color: var(--gold);
    letter-spacing: 0.04em;
  }

  .testament-label {
    position: relative;
    z-index: 10;
    text-align: center;
    font-family: 'Cinzel', serif;
    font-size: 1.4rem;
    letter-spacing: 0.35em;
    color: var(--gold);
    padding: 40px 0 10px;
    text-transform: uppercase;
    opacity: 0.8;
  }

  .testament-divider {
    width: 200px;
    height: 1px;
    background: linear-gradient(to right, transparent, var(--gold), transparent);
    margin: 0 auto 10px;
    opacity: 0.5;
  }

  /* Grid */
  .grid {
    position: relative;
    z-index: 10;
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 36px 30px;
    padding: 20px 40px 60px;
    max-width: 1600px;
    margin: 0 auto;
  }

  /* Book oval */
  .book {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    cursor: pointer;
    user-select: none;
  }

  .book-oval {
    position: relative;
    width: 240px;
    min-height: 130px;
    border: 1.5px solid var(--white-border);
    border-radius: 80px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 22px 24px 20px;
    background: rgba(255,255,255,0.025);
    transition: border-color 0.35s ease, background 0.35s ease, box-shadow 0.35s ease, transform 0.35s ease;
    backdrop-filter: blur(4px);
    z-index: 2;
  }

  .book-name {
    font-family: 'Cinzel', serif;
    font-weight: 500;
    font-size: 1.44rem;
    letter-spacing: 0.1em;
    text-align: center;
    color: var(--white);
    transition: color 0.3s;
    line-height: 1.3;
  }

  .book-theme {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 1.2rem;
    color: rgba(201,169,110,0.75);
    text-align: center;
    margin-top: 8px;
    line-height: 1.35;
    transition: color 0.3s;
    max-width: 200px;
  }

  /* Hover / open state for oval */
  .book:hover .book-oval,
  .book.open .book-oval {
    border-color: var(--gold);
    background: rgba(201,169,110,0.08);
    box-shadow: 0 0 28px rgba(201,169,110,0.2), inset 0 0 20px rgba(201,169,110,0.05);
    transform: translateY(-3px);
  }

  .book:hover .book-name,
  .book.open .book-name { color: var(--gold); }
  .book:hover .book-theme,
  .book.open .book-theme { color: rgba(201,169,110,0.95); }

  /* Verse panel (reference list) */
  .verse-panel {
    position: absolute;
    top: calc(100% + 12px);
    left: 50%;
    transform: translateX(-50%) scaleY(0);
    transform-origin: top center;
    width: 300px;
    background: rgba(0, 0, 40, 0.97);
    border: 1px solid rgba(201,169,110,0.4);
    border-radius: 18px;
    padding: 18px 20px;
    z-index: 100;
    opacity: 0;
    pointer-events: none;
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.25s ease;
    backdrop-filter: blur(12px);
    box-shadow: 0 20px 60px rgba(0,0,0,0.6), 0 0 40px rgba(201,169,110,0.1);
  }

  .book.open .verse-panel {
    opacity: 1;
    transform: translateX(-50%) scaleY(1);
    pointer-events: auto;
  }

  .verse-panel-title {
    font-family: 'Cinzel', serif;
    font-size: 1.1rem;
    letter-spacing: 0.2em;
    color: var(--gold);
    text-align: center;
    margin-bottom: 12px;
    opacity: 0.8;
    text-transform: uppercase;
  }

  .verse-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .verse-item {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.7rem;
    color: rgba(255,255,255,0.85);
    padding: 7px 10px;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.2s, color 0.2s;
    line-height: 1.3;
    letter-spacing: 0.01em;
  }

  .verse-item:hover {
    background: rgba(201,169,110,0.12);
    color: var(--gold);
  }

  /* ── VERSE MODAL ── */
  .verse-modal-overlay {
    position: fixed;
    inset: 0;
    z-index: 9000;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    background: rgba(0,0,20,0.7);
    backdrop-filter: blur(6px);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s ease;
  }
  .verse-modal-overlay.visible {
    opacity: 1;
    pointer-events: auto;
  }

  .verse-modal {
    position: relative;
    max-width: 560px;
    width: 100%;
    background: rgba(0, 0, 45, 0.98);
    border: 1px solid rgba(201,169,110,0.5);
    border-radius: 24px;
    padding: 44px 48px 40px;
    box-shadow: 0 30px 80px rgba(0,0,0,0.8), 0 0 60px rgba(201,169,110,0.12);
    transform: translateY(16px) scale(0.97);
    transition: transform 0.3s cubic-bezier(0.34, 1.4, 0.64, 1), opacity 0.25s ease;
    opacity: 0;
  }
  .verse-modal-overlay.visible .verse-modal {
    transform: translateY(0) scale(1);
    opacity: 1;
  }

  .verse-modal-close {
    position: absolute;
    top: 18px;
    right: 22px;
    background: none;
    border: none;
    color: rgba(255,255,255,0.35);
    font-size: 2rem;
    line-height: 1;
    cursor: pointer;
    transition: color 0.2s;
    font-family: 'Cormorant Garamond', serif;
    padding: 4px 8px;
    border-radius: 6px;
  }
  .verse-modal-close:hover { color: var(--gold); }

  .verse-modal-ref {
    font-family: 'Cinzel', serif;
    font-size: 1.3rem;
    letter-spacing: 0.18em;
    color: var(--gold);
    margin-bottom: 18px;
    display: block;
    text-transform: uppercase;
  }

  .verse-modal-text {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 1.9rem;
    line-height: 1.7;
    color: rgba(255,255,255,0.92);
  }

  .verse-modal-loading {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 1.5rem;
    color: rgba(255,255,255,0.3);
  }

  footer {
    position: relative;
    z-index: 10;
    text-align: center;
    padding: 30px;
    border-top: 1px solid rgba(255,255,255,0.06);
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 1.7rem;
    color: rgba(255,255,255,0.25);
    letter-spacing: 0.05em;
  }

  @media (max-width: 600px) {
    .grid { gap: 22px 16px; padding: 16px 16px 40px; }
    .book-oval { width: 200px; min-height: 110px; }
    .book-name { font-size: 1.2rem; }
    .book-theme { font-size: 1rem; max-width: 170px; }
    .verse-panel { width: 260px; }
    .verse-modal { padding: 34px 26px 28px; }
    .verse-modal-text { font-size: 1.55rem; }
  }
</style>
</head>

<div class="stars" id="stars"></div>

// ─── VERSE TEXT CACHE ─────────────────────────────────────────────────────────
const verseCache = {};

async function fetchVerseText(book, verse) {
  const key = `${book} ${verse}`;
  if (verseCache[key]) return verseCache[key];
  const ref = encodeURIComponent(`${book} ${verse}`);
  try {
    const res = await fetch(`https://bible-api.com/${ref}?translation=kjv`);
    if (!res.ok) throw new Error();
    const data = await res.json();
    const text = data.text?.trim().replace(/\s+/g,' ') || '(text unavailable)';
    verseCache[key] = text;
    return text;
  } catch(e) {
    verseCache[key] = '(text unavailable — check your connection)';
    return verseCache[key];
  }
}

// ─── STAR FIELD ──────────────────────────────────────────────────────────────
function buildStars() {
  const container = document.getElementById('stars');
  for (let i = 0; i < 180; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 1.8 + 0.4;
    s.style.cssText = `
      width:${size}px; height:${size}px;
      top:${Math.random()*100}%;
      left:${Math.random()*100}%;
      --d:${(Math.random()*5+3).toFixed(1)}s;
      --o:${(Math.random()*0.5+0.1).toFixed(2)};
      animation-delay:${(Math.random()*6).toFixed(1)}s;
    `;
    container.appendChild(s);
  }
}

async function openVerseModal(book, verse) {
  modalRef.textContent = `${book} ${verse}`;
  modalContent.className = 'verse-modal-loading';
  modalContent.textContent = 'Loading verse…';
  modal.classList.add('visible');

  const text = await fetchVerseText(book, verse);
  modalContent.className = 'verse-modal-text';
  modalContent.textContent = text;
}

function closeVerseModal() {
  modal.classList.remove('visible');
}

modalClose.addEventListener('click', (e) => { e.stopPropagation(); closeVerseModal(); });
modal.addEventListener('click', (e) => { if (e.target === modal) closeVerseModal(); });
document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeVerseModal(); });

// ─── BUILD UI ─────────────────────────────────────────────────────────────────
function buildUI() {
  const app = document.getElementById('app');
  let lastTestament = null;

  BOOKS.forEach(book => {
    if (book.testament !== lastTestament) {
      lastTestament = book.testament;
      const label = document.createElement('div');
      label.className = 'testament-label';
      label.innerHTML = `
        <div class="testament-divider"></div>
        ${book.testament === 'OT' ? 'Old Testament' : 'New Testament'}
      `;
      const grid = document.createElement('div');
      grid.className = 'grid';
      grid.dataset.testament = book.testament;
      app.appendChild(label);
      app.appendChild(grid);
    }

    const currentGrid = app.querySelector(`.grid[data-testament="${book.testament}"]`);
    currentGrid.appendChild(createBookEl(book));
  });
}

let currentOpen = null;

function createBookEl(book) {
  const el = document.createElement('div');
  el.className = 'book';

  const oval = document.createElement('div');
  oval.className = 'book-oval';

  const name = document.createElement('div');
  name.className = 'book-name';
  name.textContent = book.name;

  const theme = document.createElement('div');
  theme.className = 'book-theme';
  theme.textContent = book.theme;

  oval.appendChild(name);
  oval.appendChild(theme);

  // Verse reference list panel
  const panel = document.createElement('div');
  panel.className = 'verse-panel';

  const panelTitle = document.createElement('div');
  panelTitle.className = 'verse-panel-title';
  panelTitle.textContent = 'Keystone Verses';

  const list = document.createElement('ul');
  list.className = 'verse-list';

  book.verses.forEach(v => {
    const li = document.createElement('li');
    li.className = 'verse-item';
    li.textContent = `${book.name} ${v}`;
    li.addEventListener('click', (e) => {
      e.stopPropagation();
      openVerseModal(book.name, v);
    });
    list.appendChild(li);
  });

  panel.appendChild(panelTitle);
  panel.appendChild(list);

  el.appendChild(oval);
  el.appendChild(panel);

  // Toggle verse list on oval click
  el.addEventListener('click', (e) => {
    e.stopPropagation();
    if (currentOpen && currentOpen !== el) {
      currentOpen.classList.remove('open');
    }
    el.classList.toggle('open');
    currentOpen = el.classList.contains('open') ? el : null;
  });

  return el;
}

// Close panels on body click
document.body.addEventListener('click', () => {
  if (currentOpen) {
    currentOpen.classList.remove('open');
    currentOpen = null;
  }
});

buildStars();
buildUI();
</script>
